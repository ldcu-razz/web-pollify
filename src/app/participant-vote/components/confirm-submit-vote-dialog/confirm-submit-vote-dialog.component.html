<h2 mat-dialog-title class="text-lg font-medium">Confirm vote submission</h2>

<div mat-dialog-content>
  <p class="text-sm text-(--md-sys-color-on-surface-variant) mt-1">
    Please review your selected candidates before submitting.
  </p>

  <div class="mt-4 flex flex-col gap-2 max-h-[55vh] overflow-auto pr-1">
    @for (row of selectedVotesSummary(); track row.positionName) {
      <div class="flex gap-1 rounded-lg border border-(--md-sys-color-outline-variant) p-3">
        <div class="text-sm font-bold">{{ row.positionName }}: </div>
        <div class="text-sm text-(--md-sys-color-on-surface-variant)">{{ row.label }}</div>
      </div>
    }
  </div>
</div>

<div mat-dialog-actions align="end" class="gap-1">
  <button matButton="filled" color="primary" (click)="confirm()">Confirm & Submit</button>
  <button matButton="tonal" color="primary" (click)="cancel()">Cancel</button>
</div>
